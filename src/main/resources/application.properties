spring.application.name=file_sync_service

# ===== MinIO configuration =====
minio.endpoint=http://localhost:9100
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=file-sync
# Tu dong tao bucket khi khoi dong neu chua ton tai
minio.auto-create-bucket=true

# ===== File upload limits =====
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ===== Datasource (MySQL) =====
spring.datasource.url=jdbc:mysql://localhost:3306/file_sync?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
jwt.access-expiration=900000
jwt.refresh-expiration=604800000
jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-32-bytes-min}
