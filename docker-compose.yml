services:
  minio:
    image: minio/minio:latest
    container_name: file-sync-minio
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000"   # API endpoint (host 9100 -> container 9000)
      - "9101:9001"   # Web console (host 9101 -> container 9001)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Tạo sẵn bucket "file-sync" ngay khi MinIO khởi động
  minio-init:
    image: minio/mc:latest
    container_name: file-sync-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/file-sync &&
      echo 'Bucket file-sync da san sang' &&
      exit 0
      "

  mysql:
    image: mysql:8.4
    container_name: file-sync-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: file_sync
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  minio-data:
  mysql-data:
